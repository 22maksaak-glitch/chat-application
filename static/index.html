<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат с комнатами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0b0f1c; color: #0ff; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0a0e1a; border-right: 1px solid #0ff3; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #0f1322; padding: 8px 12px; border-radius: 8px; border-left: 3px solid #0ff; }
        .message-system { border-left-color: #f0f; color: #f0f; }
        .message .nick { font-weight: bold; color: #0ff; }
        .input-area { padding: 20px; background: #0a0e1a; border-top: 1px solid #0ff3; display: flex; gap: 10px; }
        input, button { background: #0f1322; border: 1px solid #0ff6; color: #0ff; padding: 10px; font-family: monospace; }
        button { cursor: pointer; }
        button:hover { background: #0ff2; }
        .user-list { list-style: none; }
        .user-list li { padding: 5px 0; }
        .room-input { display: flex; gap: 5px; margin-top: 10px; }
        h3 { margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="sidebar">
    <div>
        <h3>👤 Ваш ник</h3>
        <input type="text" id="nickname" placeholder="Никнейм" value="User" />
    </div>
    <div>
        <h3>🏠 Комната</h3>
        <div class="room-input">
            <input type="text" id="roomName" placeholder="general" value="general" />
            <button id="joinBtn">Войти</button>
        </div>
    </div>
    <div>
        <h3>👥 В комнате</h3>
        <ul id="userList" class="user-list"></ul>
    </div>
</div>
<div class="chat">
    <div id="messages" class="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Сообщение..." style="flex:1" />
        <button id="sendBtn">Отправить</button>
    </div>
</div>
<script>
    let ws = null;
    let currentRoom = null;
    let nickname = '';

    const messagesDiv = document.getElementById('messages');
    const userListDiv = document.getElementById('userList');
    const nicknameInput = document.getElementById('nickname');
    const roomNameInput = document.getElementById('roomName');
    const joinBtn = document.getElementById('joinBtn');
    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');

    function addMessage(msg) {
        const div = document.createElement('div');
        div.className = 'message';
        if (msg.nickname === 'system') div.classList.add('message-system');
        const time = new Date(msg.timestamp).toLocaleTimeString();
        div.innerHTML = `<span class="nick">${escapeHtml(msg.nickname)}</span> <span style="color:#888">${time}</span><br/>${escapeHtml(msg.text)}`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateUserList(users) {
        userListDiv.innerHTML = '';
        users.forEach(u => {
            const li = document.createElement('li');
            li.textContent = u;
            userListDiv.appendChild(li);
        });
    }

    function connect() {
        if (ws) ws.close();
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', nickname: nickname, room: currentRoom }));
        };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'history') {
                data.messages.forEach(msg => addMessage(msg));
            } else if (data.type === 'user_list') {
                updateUserList(data.users);
            } else if (data.type === 'message') {
                addMessage(data);
            }
        };
        ws.onclose = () => {
            console.log('Disconnected');
        };
    }

    joinBtn.onclick = () => {
        nickname = nicknameInput.value.trim();
        if (!nickname) return alert('Введите ник');
        currentRoom = roomNameInput.value.trim() || 'general';
        connect();
    };

    sendBtn.onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Не подключено');
        const text = messageInput.value.trim();
        if (!text) return;
        ws.send(JSON.stringify({ type: 'message', text: text }));
        messageInput.value = '';
    };

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>
</body>
</html>
